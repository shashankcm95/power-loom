name: Auto-publish GitHub Release on semver tag

# H.7.23 — Closes drift-note 44: auto-create a GitHub Release whenever a
# semver tag (v*) is pushed. We had to manually publish v1.1.3 in H.7.22
# despite having tags pushed — Releases are a separate object that needs
# explicit creation. This workflow makes phase-tag → release a one-step
# operation.
#
# Trigger: push of refs/tags/v* (e.g., v1.2.0, v2.0.0, v1.2.1). Phase tags
# (phase-H.7.X) deliberately excluded — they're internal phase markers, not
# user-facing releases.
#
# Per H.7.23 plan code-reviewer FAIL #5: NOT parsing CHANGELOG.md (our
# format uses `## [Unreleased]` permanently — awk would extract empty
# notes). Instead uses the tag annotation message as release notes, which
# is already comprehensive (see phase-H.7.22 / v1.1.3 tag annotations
# for the established shape).

on:
  push:
    tags:
      - "v*"

permissions:
  # Required for `gh release create`
  contents: write

jobs:
  publish-release:
    name: Publish GitHub Release from tag annotation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full tag info (including annotation) for the release notes.
          fetch-depth: 0

      # H.7.24 — drift-note 51 fix: explicitly fetch all tag refs so annotated
      # tag content is locally available. actions/checkout@v4 with fetch-depth:0
      # fetches commits + branch refs but does NOT guarantee annotated tag
      # objects. v1.2.0 + v1.2.1 releases shipped with empty annotation extraction
      # and fell back to merge commit message ("v1.2.0 — Merge pull request...").
      - name: Fetch annotated tags
        run: git fetch origin --tags --force --prune

      - name: Extract tag info
        id: tag
        run: |
          set -e
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          # H.7.24 — drift-note 51 fix: switched from `git tag -l --format='%(contents)'`
          # (returns empty in CI runners on annotated tags pushed via gh/CLI) to
          # `git for-each-ref --format='%(contents)' "refs/tags/$TAG_NAME"` which
          # reliably reads the tag object's annotation message.
          #
          # Per H.7.24 plan code-reviewer FLAG #2: lightweight tags (e.g., from
          # `gh pr merge --tag` or GitHub's "create release from tag" UI) still
          # produce empty `%(contents)`. The fallback to merge commit message
          # remains as a safety net but warns operators about the lightweight-tag
          # case so they know to push annotated tags going forward.
          ANNOTATION=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG_NAME")
          if [ -z "$ANNOTATION" ]; then
            echo "::warning::Tag $TAG_NAME annotation empty. This typically means a"
            echo "::warning::lightweight tag (e.g., from gh PR merge UI). Falling back"
            echo "::warning::to commit message — push annotated tags via 'git tag -a' for richer Release notes."
            ANNOTATION=$(git log -1 --format='%B' "$TAG_NAME")
          fi

          # Save to file (multi-line variable handling)
          ANNOTATION_FILE=$(mktemp)
          echo "$ANNOTATION" > "$ANNOTATION_FILE"
          echo "annotation_file=$ANNOTATION_FILE" >> "$GITHUB_OUTPUT"

          echo ""
          echo "Tag:        $TAG_NAME"
          echo "Annotation: ($(wc -l < "$ANNOTATION_FILE") lines)"

      - name: Determine release title
        id: title
        run: |
          # First non-empty line of annotation (typically a summary line)
          # if no annotation, fallback to "Release $TAG_NAME"
          TAG="${{ steps.tag.outputs.tag_name }}"
          FILE="${{ steps.tag.outputs.annotation_file }}"
          FIRST_LINE=$(grep -m1 -v '^[[:space:]]*$' "$FILE" || echo "")
          if [ -z "$FIRST_LINE" ]; then
            TITLE="Release $TAG"
          else
            # Trim and use first line
            TITLE="$TAG — ${FIRST_LINE#"${FIRST_LINE%%[![:space:]]*}"}"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "Release title: $TITLE"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag_name }}"
          FILE="${{ steps.tag.outputs.annotation_file }}"
          TITLE="${{ steps.title.outputs.title }}"

          # If a Release for this tag already exists (e.g., manually created
          # before this workflow shipped), skip rather than fail.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "::notice::Release for $TAG already exists; skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file "$FILE"

          echo "::notice::Created Release $TAG"
